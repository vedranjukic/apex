appId: com.apex.desktop
productName: Apex
directories:
  output: ../../dist-electron
  buildResources: assets
files:
  - apps/api/dist/**/*
  - apps/dashboard/dist/**/*
  - apps/desktop/dist/**/*
  - node_modules/**/*
  - "!node_modules/.cache"
  - "!node_modules/@nx/**"
  - "!node_modules/@swc/**"
  - "!node_modules/typescript/**"
  - "!node_modules/@playwright/**"
  - "!node_modules/vite/**"
  - "!node_modules/@vitejs/**"
  - "!node_modules/tailwindcss/**"
mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.developer-tools
extraMetadata:
  main: apps/desktop/dist/main.js
